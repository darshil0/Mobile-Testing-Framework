name: Android Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    # Required: reactivecircus/android-emulator-runner needs macOS for hardware-accelerated x86_64 emulation.
    # ubuntu-latest does NOT support this and will fail at emulator boot.
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      # Override config.json defaults via the framework's env-var interpolation (${VAR:-default})
      ANDROID_VERSION: "12.0"
      ANDROID_APP_PATH: ${{ github.workspace }}/app/app-debug.apk  # Update to your actual APK path

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UiAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium driver list --installed
          # Export explicit paths so AppiumServerManager (AppiumServiceBuilder) can locate
          # node and appium reliably across all shell contexts inside the emulator-runner.
          echo "NODE_PATH=$(which node)" >> $GITHUB_ENV
          echo "APPIUM_JS_PATH=$(npm root -g)/appium/build/lib/main.js" >> $GITHUB_ENV

      - name: Run Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: mvn clean test -Dplatform=android

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: reports/screenshots/
